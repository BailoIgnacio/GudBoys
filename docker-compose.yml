services:
  mysql:
    image: mysql:8.3
    container_name: gudboys-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gudboys
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: gudboys-app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      # 8080 del host ya lo usa otro proyecto, mapeamos al 8081
      - "8081:8080"

volumes:
  mysql-data:
