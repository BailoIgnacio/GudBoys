# Functional Spec — Gud Boys (Refugio Animal)
> Version: 1.0 | Fecha: 2026-06-19 | Estado: Draft

## 1. Propósito y Resumen

**Gud Boy** es una cadena de refugios animales que necesita un sistema para:
- Gestionar el ingreso y seguimiento médico de animales (domésticos y salvajes)
- Administrar alarmas de control veterinario y tratamientos
- Manejar el proceso de adopción de animales domésticos
- Coordinar visitas de seguimiento post-adopción

El sistema interactúa con un módulo externo de autenticación y con servicios de notificación (push, SMS, WhatsApp, email).

---

## 2. Usuarios y Actores

| Actor | Descripción |
|-------|-------------|
| **Veterinario** | Crea alarmas, atiende alertas, completa fichas médicas |
| **Visitador** | Realiza visitas domiciliarias post-adopción, completa encuestas |
| **Sistema de Autenticación (externo)** | Gestiona login/registro. Nuestro sistema solo guarda una referencia (\`externalId\`) |
| **Adoptante** | Cliente que adopta un animal doméstico |
| **Sistema de Notificaciones (externo)** | Firebase (push), SMS, WhatsApp, Email |

---

## 3. Casos de Uso

### CU-01 — Ingresar Animal al Refugio
**Actor:** Veterinario

1. El veterinario carga: tipo (doméstico/salvaje), especie, altura, peso, edad, condición médica.
2. El sistema crea \`AnimalDomestico\` o \`AnimalSalvaje\`.
3. Se genera automáticamente una \`FichaMedica\` vacía.

**Reglas:** RN-01, RN-02

### CU-02 — Exportar Ficha Médica
**Actor:** Veterinario

1. Se selecciona el animal y el formato (PDF o Excel).
2. El sistema delega al exportador correspondiente (\`ExportadorPDF\` / \`ExportadorExcel\`).

**Reglas:** RN-03

### CU-03 — Crear/Actualizar Alarma de Control
**Actor:** Veterinario

1. El veterinario configura: periodicidad (días), si es tratamiento médico, acciones.
2. La alarma se guarda con estado \`ACTIVA\`.

**Reglas:** RN-04, RN-07

### CU-04 — Disparar y Atender Alarma
**Actor:** Sistema + Veterinario

1. El sistema dispara la alarma → genera \`Alerta\` → push notification a todos los veterinarios.
2. Un veterinario atiende: marca acciones completadas, deja comentario.
3. Si es tratamiento, indica si finalizó → alarma pasa a \`FINALIZADA\` y el animal queda libre.

**Reglas:** RN-04, RN-05, RN-06, RN-07

### CU-05 — Registrar Adopción
**Actor:** Empleado/Veterinario

1. Se cargan datos del adoptante.
2. Se valida que el animal sea adoptable (no salvaje, no bajo tratamiento, adoptante < 2 adopciones).

**Reglas:** RN-08, RN-09, RN-10

### CU-06 — Configurar Seguimiento de Visitas
**Actor:** Empleado/Veterinario

1. Se asigna visitador responsable, cadencia de visitas y preferencia de recordatorio.

**Reglas:** RN-11, RN-12

### CU-07 — Registrar Visita Domiciliaria
**Actor:** Visitador

1. El visitador completa la encuesta (estado animal, limpieza, ambiente).
2. Indica si continúan las visitas.
3. Se agrega el registro al historial de la ficha médica del animal.

**Reglas:** RN-13, RN-14

### CU-08 — Enviar Recordatorio de Visita
**Actor:** Sistema (automático)

1. El sistema detecta visitas en los próximos N días.
2. Envía recordatorio por canal preferido (SMS/WhatsApp/Email).

**Reglas:** RN-12

---

## 4. Reglas de Negocio

### RN-01 — Tipos de Animal
Doméstico (perro, gato, etc.) o Salvaje (zorro, pingüino, etc.). Determina adoptabilidad.
*Uso: CU-01, CU-05*

### RN-02 — Ficha Técnica Obligatoria
Todo animal requiere: altura, peso, edad, condición médica.
*Uso: CU-01*

### RN-03 — Escalabilidad en Exportación
Debe soportar PDF y Excel sin modificar código existente (Strategy pattern).
*Uso: CU-02*

### RN-04 — Alarma con Acciones
Periodicidad en días + set de acciones: Control parásitos, Antiparasitarios, Peso/Tamaño, Nutrición, Vacuna.
*Uso: CU-03, CU-04*

### RN-05 — Notificación a Veterinarios
Alarma disparada → push notification a TODOS los veterinarios.
*Uso: CU-04*

### RN-06 — Registro de Atención
Debe documentar acciones realizadas + comentario. Si es tratamiento, indicar si finalizó.
*Uso: CU-04*

### RN-07 — Tratamiento Bloquea Adopción
Animal en tratamiento médico activo (alarma ACTIVA o ATENDIDA sin finalizar) NO puede adoptarse.
*Uso: CU-04, CU-05*

### RN-08 — Solo Domésticos Son Adoptables
Salvajes NUNCA se adoptan.
*Uso: CU-05*

### RN-09 — Límite de Adopciones
Máximo 2 animales por adoptante.
*Uso: CU-05*

### RN-10 — Datos del Adoptante
Requiere: nombre, apellido, estado civil, email, teléfono, ocupación, mascotas existentes, motivo, tipos de interés.
*Uso: CU-05*

### RN-11 — Visitador Responsable
Todo seguimiento post-adopción tiene un visitador asignado.
*Uso: CU-06*

### RN-12 — Recordatorio Configurable
N días de anticipación (parámetro). Canales: SMS, WhatsApp, Email.
*Uso: CU-06, CU-08*

### RN-13 — Encuesta de Visita
Tres ítems calificados MALO/REGULAR/BUENO: estado animal, limpieza del lugar, ambiente.
*Uso: CU-07*

### RN-14 — Historial Unificado
Todos los eventos (atenciones veterinarias y visitas) quedan en la FichaMedica del animal.
*Uso: CU-04, CU-07*

## 6. Estados de la Alarma

| Estado | Descripción | Transición |
|--------|-------------|------------|
| \`ACTIVA\` | Vigente. Bloquea adopción si es tratamiento. | → ATENDIDA |
| \`ATENDIDA\` | Atendida sin finalizar tratamiento. Sigue bloqueando. | → FINALIZADA |
| \`FINALIZADA\` | Tratamiento completo. No bloquea adopción. | (terminal) |

- Login y registro (módulo externo)
- Permisos y roles (módulo externo)
- Pasarela de pagos

| Animal Doméstico | Adoptable (perro, gato, canario, loro, tortuga, etc.) |

## 4. Modelo de Datos

### Animal (JOINED inheritance)
- \`id\`, \`altura\`, \`peso\`, \`edad\`, \`condicionMedica\`
- → FichaMedica (1:1), Alarma (1:N)

### AnimalDomestico extends Animal
- \`especie\`
- \`esAdoptable()\`: false si tiene alarma de tratamiento ACTIVA/ATENDIDA

### AnimalSalvaje extends Animal
- \`especie\`
- \`esAdoptable()\`: siempre false

### FichaMedica
- \`id\`, → animal (1:1), → eventos (1:N ordenados por fecha)

### Evento (JOINED inheritance)
- \`id\`, \`descripcion\`, \`fechaHora\`, → fichaMedica

### RegistroAtencion extends Evento
- \`comentario\`, \`tratamientoFinalizado\`, → veterinario
- \`accionesRealizadas\`: List<AccionAlarma> (ElementCollection)

### Alarma
- \`id\`, \`periodicidad\`, \`esTratamientoMedico\`, \`estado\` (EstadoAlarma)
- → animal, \`acciones\`: List<AccionAlarma> (ElementCollection)

### Usuario (JOINED inheritance)
- \`id\`, \`externalId\`, \`nombre\`, \`email\`
- → Veterinario, Visitador

### Adoptante
- \`id\`, \`nombre\`, \`apellido\`, \`estadoCivil\`, \`email\`, \`telefono\`
- \`ocupacion\` (Ocupacion enum), \`tieneMascotas\`, \`motivoAdopcion\`
- \`tiposAnimalesInteresados\`: List<String> (ElementCollection)
- \`cantAnimalesAdoptados\` (max 2)

### Adopcion
- → adoptante, → animal (AnimalDomestico, 1:1), \`fechaAdopcion\`
- → seguimientoVisitas (1:1)

### SeguimientoVisitas
- → adopcion, → visitador, \`diaVisita\`, \`horarioVisita\`
- \`preferenciaRecordatorio\` (PreferenciaRecordatorio enum)
- → visitas: List<VisitaDomicilio>

## 8. Decisiones Técnicas (TD-XX)

### TD-01 — Herencia JPA con JOINED strategy
- **Contexto:** Animal, Usuario y Evento tienen subtipos con campos distintos.
- **Decisión:** \`@Inheritance(strategy = InheritanceType.JOINED)\` — tabla separada por subtipo.
- **Trade-off:** Más JOINs vs. modelo limpio sin columnas nulas.
- **Status:** Confirmado.

### TD-02 — AccionAlarma como Enum + ElementCollection
- **Contexto:** El diseño propone Composite para acciones.
- **Decisión:** \`enum AccionAlarma\` con \`@ElementCollection\` en Alarma y RegistroAtencion.
- **Trade-off:** Menos flexible, mucho más simple. Suficiente para los requisitos actuales.
- **Status:** Confirmado.

### TD-03 — externalId para usuarios externos
- **Contexto:** Autenticación es responsabilidad de un módulo externo.
- **Decisión:** Guardar \`externalId\` (String) en Usuario. \`AuthServiceAdapter\` para consultas al módulo externo.
- **Trade-off:** Acoplamiento ligero — si el servicio externo cambia, solo se modifica el adaptador.
- **Status:** Confirmado por enunciado.

### TD-04 — Patrones de diseño pendientes [TODO]
- **Contexto:** El TP exige Strategy (exportación, recordatorios) y Observer (push notifications).
- **Decisión:** Interfaces creadas (\`IExportadorStrategy\`, \`IRecordatorioStrategy\`, \`INotificadorPush\`). Implementaciones pendientes.
- **Trade-off:** Sin implementación, la exportación y notificaciones lanzarán UnsupportedOperationException.
- **Status:** [TODO] Implementación pendiente.

let currentTab = 'functional';

mermaid.initialize({ startOnLoad: false, theme: 'dark', themeVariables: { primaryColor: '#7c6af7', primaryTextColor: '#e2e8f0', primaryBorderColor: '#2d3148', lineColor: '#4ecdc4', secondaryColor: '#1e2130', tertiaryColor: '#12151f' } });

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'functional') || (i === 1 && tab === 'technical'));
  });
  renderContent(tab === 'functional' ? FUNCTIONAL : TECHNICAL);
}

function renderContent(markdown) {
  const content = document.getElementById('content-area');
  content.innerHTML = marked.parse(markdown);
  // Render mermaid
  content.querySelectorAll('pre code.language-mermaid, code.language-mermaid').forEach((block) => {
    const container = document.createElement('div');
    container.className = 'mermaid';
    container.textContent = block.textContent;
    block.closest('pre').replaceWith(container);
  });
  mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
  // Highlight tags
  content.innerHTML = content.innerHTML
    .replace(/\[INFERRED\]/g, '<span data-tag="INFERRED">[INFERRED]</span>')
    .replace(/\[TODO\]/g, '<span data-tag="TODO">[TODO]</span>')
    .replace(/\[CONFIRMED\]/g, '<span data-tag="CONFIRMED">[CONFIRMED]</span>')
    .replace(/\[ASSUMPTION\]/g, '<span data-tag="ASSUMPTION">[ASSUMPTION]</span>')
    .replace(/\[POR HACER\]/g, '<span data-tag="TODO">[POR HACER]</span>');
  buildNav();
}

function buildNav() {
  const nav = document.getElementById('nav-links');
  const headings = document.querySelectorAll('#content-area h2, #content-area h3');
  nav.innerHTML = '';
  headings.forEach((h) => {
    const id = h.textContent.trim().toLowerCase().replace(/[^a-z0-9À-ɏ]+/g, '-');
    h.id = id;
    const a = document.createElement('a');
    a.href = '#' + id;
    a.textContent = h.textContent.trim();
    if (h.tagName === 'H3') a.classList.add('h3-link');
    a.onclick = (e) => { e.preventDefault(); h.scrollIntoView({ behavior: 'smooth', block: 'start' }); };
    nav.appendChild(a);
  });
}

switchTab('functional');
</script>
