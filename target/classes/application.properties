# ===== BASE DE DATOS =====
spring.datasource.url=jdbc:mysql://localhost:3306/gudboys?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== SERVIDOR =====
server.port=8080

# ===== APLICACION =====
spring.application.name=gudboys

# ===== RECORDATORIOS =====
# Cantidad de dias de anticipacion para enviar recordatorio de visita
gudboys.recordatorio.dias-anticipacion=3

# ===== SERVICIOS EXTERNOS =====
gudboys.auth.service-url=${AUTH_SERVICE_URL:http://localhost:9090}
gudboys.firebase.server-key=${FIREBASE_SERVER_KEY:changeme}

# ===== ACTUATOR =====
management.endpoints.web.exposure.include=health,info
