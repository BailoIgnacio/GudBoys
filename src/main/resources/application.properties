# ===== BASE DE DATOS =====
# El host "mysql" es el nombre del servicio en docker-compose.yml
spring.datasource.url=jdbc:mysql://mysql:3306/gudboys?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== POOL DE CONEXIONES (HikariCP) =====
spring.datasource.hikari.pool-name=GudBoysPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== SERVIDOR =====
server.port=8080

# ===== APLICACION =====
spring.application.name=gudboys

# ===== RECORDATORIOS =====
# Cantidad de dias de anticipacion para enviar recordatorio de visita
gudboys.recordatorio.dias-anticipacion=3

# ===== SCHEDULERS =====
# Disparo de alarmas vencidas (intervalo en ms). Default: cada 1 hora.
gudboys.scheduler.alarmas.fixed-delay=3600000
# Envio de recordatorios de visita (cron). Default: todos los dias a las 08:00.
gudboys.scheduler.recordatorios.cron=0 0 8 * * *

# ===== SERVICIOS EXTERNOS =====
gudboys.auth.service-url=http://localhost:9090
gudboys.firebase.server-key=changeme

# ===== ACTUATOR =====
management.endpoints.web.exposure.include=health,info
